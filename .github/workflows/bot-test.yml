# Manueller Bot-Test: schickt eine Testnachricht in die Kanäle.
# Nur von Hand startbar (Actions -> Bot-Test -> Run workflow).
name: Bot-Test

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Testnachricht posten
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_API_URL: ${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_CHANNEL_ID: ${{ secrets.WHATSAPP_CHANNEL_ID }}
        run: >
          node automation/leak-bot/post-leak.mjs
          --type news
          --title "BrickSpecs Bot ist online"
          --body "Ab jetzt landen hier automatisch die besten LEGO-Deals und Leaks - alle 15 Minuten geprueft. Willkommen an Bord!"
          --url "https://brickspecs.vercel.app"
